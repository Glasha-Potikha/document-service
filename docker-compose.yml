services:
  postgres:
    image: postgres:15-alpine
    container_name: document-service-db
    environment:
      POSTGRES_DB: documentdb
      POSTGRES_USER: documentuser
      POSTGRES_PASSWORD: documentpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U documentuser -d documentdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: