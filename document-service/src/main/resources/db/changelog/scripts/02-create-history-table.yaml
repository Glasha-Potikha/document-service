databaseChangeLog:
  - changeSet:
      id: 2
      author: glashaty
      changes:
        - createTable:
            tableName: document_status_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: initiator
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(20)      # SUBMIT, APPROVE
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_history_document
            baseTableName: document_status_history
            baseColumnNames: document_id
            referencedTableName: documents
            referencedColumnNames: id
            onDelete: CASCADE